global:
  scrape_interval: 10s
  external_labels:
    environment: lab-test

rule_files:
  - '/etc/prometheus/rules/*.yml'
  - '/etc/prometheus/alerts/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    file_sd_configs:
      - files: ['/etc/prometheus/sd/targets.json']
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [scrape_job]
        action: keep
        regex: prometheus

  - job_name: 'node'
    file_sd_configs:
      - files: ['/etc/prometheus/sd/targets.json']
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [scrape_job]
        action: keep
        regex: node

  - job_name: 'demo-api'
    file_sd_configs:
      - files: ['/etc/prometheus/sd/targets.json']
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [scrape_job]
        action: keep
        regex: demo-api
#  - job_name: 'demo-api'
#    static_configs:
#      - targets: ['192.168.1.182:8000']

alerting:
  alertmanagers:
    - static_configs:
